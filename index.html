<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta http-equiv="Cache-Control" content="public, max-age=31536000" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    
    <!-- Preconnect crítico -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://qtrypzzcjebvfcihiynt.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://qtrypzzcjebvfcihiynt.supabase.co" />
    <link rel="dns-prefetch" href="https://cdn.onesignal.com" />
    <link rel="preconnect" href="https://media.base44.com" crossorigin />
    <link rel="dns-prefetch" href="https://media.base44.com" />

    <!-- Google Fonts: solo pesos usados en móvil, no-bloqueante -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" /></noscript>

    <link rel="icon" type="image/png" href="/logo-192.png" />

    <title>MisAutónomos - Encuentra autónomos y profesionales en España</title>
    <meta name="description" content="Encuentra y contacta con los mejores profesionales autónomos verificados cerca de ti. Electricistas, fontaneros, carpinteros y más. 100% gratis para clientes." />
    <link rel="canonical" href="https://misautonomos.es/buscar" />

    <!-- OneSignal: cargado diferido tras interacción para no bloquear LCP -->
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      // Diferir carga del SDK de OneSignal hasta después del primer input del usuario
      function _loadOneSignal() {
        if (window._oneSignalLoaded) return;
        window._oneSignalLoaded = true;
        var s = document.createElement('script');
        s.src = 'https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js';
        s.async = true;
        s.onload = function() {
          OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
              appId: "e178adb2-38e8-4397-9239-833be611ed27",
              allowLocalhostAsSecureOrigin: true,
              notifyButton: { enable: false },
              promptOptions: { slidedown: { prompts: [] } }
            });
          });
        };
        document.head.appendChild(s);
      }
      // Cargar tras interacción o 5s de timeout
      ['click','touchstart','keydown','scroll'].forEach(function(e){
        window.addEventListener(e, _loadOneSignal, { once: true, passive: true });
      });
      setTimeout(_loadOneSignal, 5000);
    </script>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1E40AF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MisAutónomos" />
    <link rel="apple-touch-icon" href="/logo-192.png" />
    <!-- CSS crítico inline: renderiza above-the-fold en móvil SIN bloquear por el bundle CSS externo -->
    <style>
      *,*::before,*::after{box-sizing:border-box}
      html,body{margin:0;padding:0;background:#fff;color:#111827;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow-x:hidden}
      #root{min-height:100vh;background:#fff}
      /* Header móvil fijo */
      @media(max-width:1023px){
        .mobile-main-content{padding-top:56px!important}
        header.mobile-header{position:fixed;top:0;left:0;right:0;height:56px;background:#fff;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:45}
      }
      /* Bottom nav — reservar espacio */
      @media(max-width:767px){body{padding-bottom:64px}}
      /* Bottom nav visible inmediatamente en móvil */
      @media(max-width:767px){
        .mobile-bottom-nav{display:grid!important;position:fixed!important;bottom:0!important;left:0!important;right:0!important;background:#fff!important;border-top:2px solid #e5e7eb!important;height:calc(56px + env(safe-area-inset-bottom,0px));z-index:40!important}
      }
      /* Imágenes — sin layout shift */
      img{max-width:100%;height:auto;display:block}
      /* Avatares */
      .avatar-fixed{width:48px;height:48px;min-width:48px;min-height:48px;flex-shrink:0;border-radius:9999px;overflow:hidden}
      /* Cards */
      .pro-card{min-height:200px;contain:layout style}
      /* Skeleton */
      .sk{background:#f3f4f6}
      /* Sidebar desktop: oculto en móvil para no causar reflow */
      @media(max-width:1023px){
        [data-sidebar="sidebar"],aside[data-state]{display:none!important;width:0!important}
      }
      /* Botones base */
      button,a{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
      /* Gradient bg */
      .min-h-screen{min-height:100vh}
      /* Prevent FOUC flash */
      #root>div{opacity:1}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
