    <!-- Preconnect adicional para cdn CDNs de terceros -->

    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />

    <!-- Google Fonts: preload solo peso 700 (hero h1) + swap — no-bloqueante -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" onload="this.onload=null;this.rel='stylesheet'" />

    <link rel="icon" type="image/png" href="/logo-192.png" />
    <title>MisAutónomos - Encuentra autónomos y profesionales en España</title>
    <meta name="description" content="Encuentra y contacta con los mejores profesionales autónomos verificados cerca de ti. Electricistas, fontaneros, carpinteros y más. 100% gratis para clientes." />
    <link rel="canonical" href="https://misautonomos.es/buscar" />

    <!-- OneSignal: cargado diferido tras interacción para no bloquear LCP -->
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      // Diferir carga del SDK de OneSignal hasta después del primer input del usuario
      function _loadOneSignal() {
        if (window._oneSignalLoaded) return;
        window._oneSignalLoaded = true;
        var s = document.createElement('script');
        s.src = 'https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js';
        s.async = true;
        s.onload = function() {
          OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
              appId: "e178adb2-38e8-4397-9239-833be611ed27",
              allowLocalhostAsSecureOrigin: true,
              notifyButton: { enable: false },
              promptOptions: { slidedown: { prompts: [] } }
            });
          });
        };
        document.head.appendChild(s);
      }
      // Cargar tras interacción o 5s de timeout
      ['click','touchstart','keydown','scroll'].forEach(function(e){
        window.addEventListener(e, _loadOneSignal, { once: true, passive: true });
      });
      setTimeout(_loadOneSignal, 5000);
    </script>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1E40AF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MisAutónomos" />
    <link rel="apple-touch-icon" href="/logo-192.png" />
    <!-- CSS crítico inline: evita CLS del layout inicial y FOUC -->
    <style>
      *,*::before,*::after{box-sizing:border-box}
      html,body{margin:0;padding:0;background:#fff;color:#111827;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden}
      #root{min-height:100vh}
      /* Reservar espacio para el header móvil fijo — evita CLS */
      @media(max-width:1023px){.mobile-main-content{padding-top:56px!important}}
      /* Bottom nav fijo — reservar espacio */
      @media(max-width:767px){body{padding-bottom:64px}}
      /* Imágenes sin dimensiones explícitas — evitar layout shift */
      img{max-width:100%;height:auto;display:block}
      /* Avatares — siempre dimensión fija */
      .avatar-fixed{width:48px;height:48px;min-width:48px;min-height:48px;flex-shrink:0;border-radius:9999px;overflow:hidden}
      /* Cards profesional — altura mínima fija */
      .pro-card{min-height:200px;contain:layout style}
      /* Skeleton sin animación costosa */
      .sk{background:#f3f4f6}
      /* Fonts sistema como fallback instantáneo */
      body{font-display:swap}
      /* Reservar altura del hero de búsqueda para evitar CLS */
      @media(max-width:767px){
        .search-hero-placeholder{min-height:420px;background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 50%,#2563eb 100%)}
      }
      /* Texto del hero visible inmediatamente con fuente sistema */
      h1{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#fff}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
